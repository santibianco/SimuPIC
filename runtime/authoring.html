<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SimuPIC — Diagram Authoring</title>
<style>
  :root { color-scheme: dark; }
  body { margin:0; font-family:system-ui,sans-serif; background:#0d1117; color:#e6edf3; }
  header { padding:14px 18px 6px; }
  h1 { font-size:17px; margin:0; font-weight:600; }
  .sub { color:#8b949e; font-size:13px; }
  .bar { display:flex; flex-wrap:wrap; gap:8px; align-items:center; padding:8px 18px;
    background:#161b22; border-bottom:1px solid #30363d; position:sticky; top:0; z-index:5; }
  button, label.file { background:#21262d; color:#e6edf3; border:1px solid #30363d; border-radius:7px;
    padding:6px 11px; font-size:13px; cursor:pointer; }
  button:hover, label.file:hover { background:#30363d; }
  button.primary { background:#238636; border-color:#2ea043; }
  input[type=file]{ display:none; }
  input[type=text]{ background:#0d1117; color:#e6edf3; border:1px solid #30363d; border-radius:6px; padding:6px 8px; font-size:13px; }
  .main { display:flex; gap:14px; padding:14px 18px; align-items:flex-start; flex-wrap:wrap; }
  #board { background:#0a1f14; border:1px solid #30363d; border-radius:12px; }
  .panel { flex:1; min-width:320px; display:flex; flex-direction:column; gap:10px; }
  .card { background:#161b22; border:1px solid #30363d; border-radius:9px; padding:10px 12px; }
  .card h3 { margin:0 0 8px; font-size:13px; display:flex; justify-content:space-between; align-items:center; }
  .row { display:flex; flex-wrap:wrap; gap:8px 14px; align-items:center; font-size:12px; color:#8b949e; }
  .row label { display:flex; gap:5px; align-items:center; }
  select { background:#0d1117; color:#e6edf3; border:1px solid #30363d; border-radius:6px; padding:4px 6px; font-size:12px; }
  .seg7 { display:grid; grid-template-columns:repeat(4,auto); gap:6px 12px; }
  .del { background:#3d1418; border-color:#6e2329; color:#f0b0b4; padding:3px 8px; font-size:11px; }
  textarea { width:100%; height:120px; background:#0d1117; color:#9fb6c9; border:1px solid #30363d;
    border-radius:8px; font-family:ui-monospace,monospace; font-size:11px; padding:8px; box-sizing:border-box; }
  .muted { color:#6e7681; font-size:12px; }
  .lib { display:flex; flex-direction:column; gap:6px; }
  .libItem { display:flex; align-items:center; gap:8px; background:#0d1117; border:1px solid #21262d; border-radius:7px; padding:6px 9px; }
  .libItem.editing { border-color:#2ea043; }
  .libItem .nm { font-size:12px; color:#e6edf3; } .libItem .gp { font-size:11px; color:#6e7681; }
  .libItem .sp { flex:1; } .libItem button { padding:3px 8px; font-size:11px; }
</style>
</head>
<body>
<header>
  <h1>SimuPIC — Diagram Authoring</h1>
  <div class="sub">Instructor tool: build boards, assign pins, set a group, then export a ready <code>labs.js</code> for the student dropdown.</div>
</header>
<div class="bar">
  <span class="muted">Name</span>
  <input id="name" type="text" value="My lab board" style="width:150px" oninput="setName(this.value)" />
  <span class="muted">Group</span>
  <input id="group" type="text" value="Trabajos Prácticos" style="width:150px" oninput="setGroup(this.value)" />
  <button onclick="addComp('led')">+ LED</button>
  <button onclick="addComp('button')">+ Button</button>
  <button onclick="addComp('sevenseg')">+ 7-seg</button>
  <button onclick="newBoard()">New board</button>
  <label class="file">Import JSON<input id="imp" type="file" accept=".json,application/json" /></label>
  <button id="saveBtn" class="primary" onclick="saveToList()">Save to lab list</button>
  <span style="flex:1"></span>
  <button onclick="importLabsJs(true)">Import labs.js</button>
  <button class="primary" onclick="saveLabs()">💾 Save labs.js</button>
  <span id="msg" class="muted"></span>
</div>
<div class="main">
  <canvas id="board" width="700" height="600"></canvas>
  <div class="panel">
    <div id="editor"></div>
    <div class="card"><h3>Lab list <span id="libCount" class="muted"></span></h3><div id="library"></div></div>
    <div class="card"><h3>Diagram JSON</h3><textarea id="json" readonly></textarea></div>
  </div>
</div>
<script src="labs.js" onerror="window.__noLabs=true"></script>
<script>
"use strict";
const PINS = ["RA0","RA1","RA2","RA3","RA4","RA5","RA6","RA7","RB0","RB1","RB2","RB3","RB4","RB5","RB6","RB7"];
const SEG = ["a","b","c","d","e","f","g"];
let diagram = { name:"My lab board", group:"Trabajos Prácticos", components:[
  { type:"led", pin:"RB0", label:"LED" },
] };

// ---- chip geometry (DIP-18) ----
const LEFT=["RA2","RA3","RA4","RA5","VSS","RB0","RB1","RB2","RB3"];
const RIGHT=["RA1","RA0","RA7","RA6","VDD","RB7","RB6","RB5","RB4"];
const CHIP={x:300,y:120,w:110,h:300}; const PIN={};
(function(){ const p=(CHIP.h-44)/8; for(let i=0;i<9;i++){ const y=CHIP.y+22+i*p;
  PIN[LEFT[i]]={x:CHIP.x-16,y,side:"L",num:i+1}; PIN[RIGHT[i]]={x:CHIP.x+CHIP.w+16,y,side:"R",num:18-i}; } })();

// ---- drawing ----
const cv=document.getElementById("board"), ctx=cv.getContext("2d");
function rr(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function wire(a,b,c,d){ ctx.strokeStyle="#3a6b4f"; ctx.lineWidth=2.5; ctx.beginPath(); ctx.moveTo(a,b); ctx.lineTo(c,d); ctx.stroke(); }
function chip(){
  ctx.fillStyle="#15191f"; ctx.strokeStyle="#454d57"; ctx.lineWidth=2; rr(CHIP.x,CHIP.y,CHIP.w,CHIP.h,8); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.arc(CHIP.x+CHIP.w/2,CHIP.y+8,9,0,Math.PI); ctx.fillStyle="#0a1f14"; ctx.fill();
  ctx.fillStyle="#c9d1d9"; ctx.font="bold 12px system-ui"; ctx.textAlign="center";
  ctx.fillText("PIC16F628A",CHIP.x+CHIP.w/2,CHIP.y+CHIP.h/2-4);
  ctx.fillStyle="#6e7681"; ctx.font="10px system-ui"; ctx.fillText("DIP-18",CHIP.x+CHIP.w/2,CHIP.y+CHIP.h/2+10);
  ctx.font="10px ui-monospace,monospace";
  for(const n in PIN){ const p=PIN[n], io=/^R[AB]/.test(n);
    ctx.strokeStyle="#8b949e"; ctx.lineWidth=2.5; ctx.beginPath();
    ctx.moveTo(p.side==="L"?CHIP.x:CHIP.x+CHIP.w,p.y); ctx.lineTo(p.x,p.y); ctx.stroke();
    ctx.fillStyle=io?"#9fb6c9":"#6e7681"; ctx.textAlign=p.side==="L"?"end":"start";
    ctx.fillText(n,p.side==="L"?p.x-4:p.x+4,p.y+3); }
}
function led(x,y,lbl){ ctx.save(); ctx.beginPath(); ctx.arc(x,y,15,0,6.29);
  ctx.fillStyle="rgba(255,90,70,0.6)"; ctx.fill(); ctx.lineWidth=2; ctx.strokeStyle="#30363d"; ctx.stroke(); ctx.restore();
  ctx.fillStyle="#8b949e"; ctx.font="10px ui-monospace,monospace"; ctx.textAlign="center"; ctx.fillText(lbl,x,y+28); }
function seven(x,y,litpins,pa,pb){ const W=92,H=140,t=14;
  const s=[[x+t,y,W-2*t,t],[x+W-t,y+t,t,H/2-t],[x+W-t,y+H/2,t,H/2-t],[x+t,y+H-t,W-2*t,t],
           [x,y+H/2,t,H/2-t],[x,y+t,t,H/2-t],[x+t,y+H/2-t/2,W-2*t,t]];
  ctx.save(); ctx.fillStyle="#070d09"; ctx.strokeStyle="#30363d"; ctx.lineWidth=1; rr(x-12,y-12,W+24,H+24,9); ctx.fill(); ctx.stroke();
  for(let i=0;i<7;i++){ ctx.fillStyle=litpins[i]?"rgba(255,70,60,0.6)":"rgba(255,70,60,0.08)"; const r=s[i]; ctx.fillRect(r[0],r[1],r[2],r[3]); }
  ctx.restore(); }
function btn(x,y,lbl){ ctx.save(); ctx.fillStyle="#21262d"; ctx.strokeStyle="#30363d"; ctx.lineWidth=2; rr(x,y,68,40,8); ctx.fill(); ctx.stroke();
  ctx.fillStyle="#e6edf3"; ctx.font="11px ui-monospace,monospace"; ctx.textAlign="center"; ctx.fillText(lbl,x+34,y+24); ctx.restore(); }

function draw(){
  ctx.clearRect(0,0,cv.width,cv.height); chip();
  const segs=diagram.components.filter(c=>c.type==="sevenseg");
  const segW=92,gap=30, sx=(cv.width-(segs.length*segW+Math.max(0,segs.length-1)*gap))/2; let si=0;
  for(const c of diagram.components){
    if(c.type==="led"){ const p=PIN[c.pin]; if(!p){continue;} const d=p.side==="R"?1:-1; const x=p.x+d*55;
      wire(p.x,p.y,x,p.y); led(x,p.y,c.label||c.pin); }
    else if(c.type==="button"){ const p=PIN[c.pin]; if(!p){continue;} const d=p.side==="R"?1:-1; const x=p.x+d*70-(d<0?68:0);
      wire(p.x,p.y,d<0?x+68:x,p.y); btn(x,p.y-20,c.label||c.pin); }
    else if(c.type==="sevenseg"){ const px=sx+(si++)*(segW+gap), py=430;
      c.pins.forEach((pn,k)=>{ const p=PIN[pn]; if(p) wire(p.x,p.y,px+10+k*11,py); });
      seven(px,py,c.pins.map(p=>!!p)); }
  }
  document.getElementById("json").value=JSON.stringify(diagram,null,2);
}

// ---- editor ----
function opts(sel){ return ['<option value="">—</option>'].concat(PINS.map(p=>`<option ${p===sel?"selected":""}>${p}</option>`)).join(""); }
function card(c,i){
  let body="";
  if(c.type==="led"||c.type==="button"){
    body=`<div class="row"><label>Pin <select onchange="setF(${i},'pin',this.value)">${opts(c.pin)}</select></label>
      <label>Label <input type="text" value="${c.label||""}" oninput="setF(${i},'label',this.value)" style="width:110px"></label>
      <label><input type="checkbox" ${c.activeLow?"checked":""} onchange="setF(${i},'activeLow',this.checked)"> active-low (pressed = 0)</label></div>`;
  } else if(c.type==="sevenseg"){
    const segSel=SEG.map((s,k)=>`<label>${s} <select onchange="setSeg(${i},${k},this.value)">${opts(c.pins[k])}</select></label>`).join("");
    body=`<div class="seg7">${segSel}</div>
      <div class="row" style="margin-top:8px">
      <label>Common <select onchange="setF(${i},'common',this.value)">${opts(c.common)}</select></label>
      <label><input type="checkbox" ${c.commonActiveLow?"checked":""} onchange="setF(${i},'commonActiveLow',this.checked)"> common active-low</label>
      <label>Label <input type="text" value="${c.label||""}" oninput="setF(${i},'label',this.value)" style="width:100px"></label></div>`;
  }
  return `<div class="card"><h3>${c.type.toUpperCase()} #${i+1}<button class="del" onclick="delComp(${i})">delete</button></h3>${body}</div>`;
}
function renderEditor(){ document.getElementById("editor").innerHTML =
  diagram.components.length ? diagram.components.map(card).join("") : '<div class="card muted">No components yet — add one above.</div>'; }
function refresh(){ renderEditor(); draw(); renderLibrary(); }

function addComp(type){
  const def = type==="led" ? {type:"led",pin:"RB0",label:"LED"}
    : type==="button" ? {type:"button",pin:"RA4",activeLow:true,label:"Button"}
    : {type:"sevenseg",pins:["RB0","RB1","RB2","RB3","RB4","RB5","RB6"],common:"RA0",commonActiveLow:false,label:"Digit"};
  diagram.components.push(def); refresh();
}
function delComp(i){ diagram.components.splice(i,1); refresh(); }
function setF(i,f,v){ diagram.components[i][f]=v; draw(); if(f==="pin"){ /* labels unaffected */ } }
function setSeg(i,k,v){ diagram.components[i].pins[k]=v; draw(); }

function exportJSON(){
  const blob=new Blob([JSON.stringify(diagram,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download=(diagram.name||"diagram").replace(/[^a-z0-9]+/gi,"_").toLowerCase()+".json"; a.click();
}
function copyJSON(){ navigator.clipboard && navigator.clipboard.writeText(JSON.stringify(diagram,null,2)); }
function setName(v){ diagram.name=v; draw(); }
function setGroup(v){ diagram.group=v; }
document.getElementById("imp").addEventListener("change", async e=>{
  const f=e.target.files[0]; if(!f) return;
  try{ const d=JSON.parse(await f.text()); if(!Array.isArray(d.components)) throw new Error("no components[]");
    diagram=d; if(!diagram.name) diagram.name="Imported board"; if(!diagram.group) diagram.group="Trabajos Prácticos";
    document.getElementById("name").value=diagram.name; document.getElementById("group").value=diagram.group; refresh();
  }catch(err){ alert("Bad diagram: "+err); }
});

// ---- lab list (board library, persisted in localStorage) ----
const LIBKEY="np_authoring_library";
let library=[]; try{ library=JSON.parse(localStorage.getItem(LIBKEY)||"[]"); }catch(e){}
let editIndex=-1;
function esc(s){ return String(s).replace(/[<>&]/g,(c)=>({"<":"&lt;",">":"&gt;","&":"&amp;"}[c])); }
function saveLib(){ try{ localStorage.setItem(LIBKEY, JSON.stringify(library)); }catch(e){} }
function saveToList(){
  const entry={ name:diagram.name||"Placa sin nombre", group:(diagram.group||"").trim()||"Trabajos Prácticos",
    components:JSON.parse(JSON.stringify(diagram.components)) };
  if(editIndex>=0 && editIndex<library.length) library[editIndex]=entry;
  else { library.push(entry); editIndex=library.length-1; }
  saveLib(); renderLibrary();
}
function editBoard(i){ const b=library[i];
  diagram={ name:b.name, group:b.group||"Trabajos Prácticos", components:JSON.parse(JSON.stringify(b.components)) };
  document.getElementById("name").value=diagram.name; document.getElementById("group").value=diagram.group;
  editIndex=i; refresh(); }
function removeBoard(i){ library.splice(i,1); if(editIndex===i) editIndex=-1; else if(editIndex>i) editIndex--; saveLib(); renderLibrary(); }
function newBoard(){ diagram={ name:"Nueva placa", group:document.getElementById("group").value||"Trabajos Prácticos", components:[] };
  document.getElementById("name").value=diagram.name; editIndex=-1; refresh(); }
function renderLibrary(){
  const el=document.getElementById("library");
  document.getElementById("libCount").textContent = library.length ? "("+library.length+")" : "";
  document.getElementById("saveBtn").textContent = editIndex>=0 ? "Update in list" : "Save to lab list";
  if(!library.length){ el.className=""; el.innerHTML='<div class="muted">No boards yet. Build one, set its Group, then “Save to lab list”.</div>'; return; }
  el.className="lib";
  el.innerHTML=library.map((b,i)=>`<div class="libItem ${i===editIndex?"editing":""}"><span class="nm">${esc(b.name)}</span><span class="gp">${esc(b.group||"")}</span><span class="sp"></span><button onclick="editBoard(${i})">edit</button><button class="del" onclick="removeBoard(${i})">remove</button></div>`).join("");
}
function labsContent(){
  const body=library.map((b)=>"  "+JSON.stringify({name:b.name, group:b.group, components:b.components})).join(",\n");
  return '// SimuPIC — lab boards for the "Placa" dropdown. Generated by the authoring tool.\n'+
    '// Overwritten by "Save labs.js"; commit + push to publish to students.\n'+
    "window.NP_LABS = [\n"+body+"\n];\n";
}
function downloadLabsFile(js){
  const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([js],{type:"text/javascript"}));
  a.download="labs.js"; a.click();
}
let msgTimer=0;
function flash(m,bad){ const el=document.getElementById("msg"); if(!el) return; el.textContent=m;
  el.style.color=bad?"#f0b0b4":"#5fb878"; clearTimeout(msgTimer); msgTimer=setTimeout(()=>{ el.textContent=""; },6000); }
async function saveLabs(){
  if(!library.length){ alert("Add at least one board to the lab list first."); return; }
  const js=labsContent();
  try{
    const r=await fetch("/__save_labs",{method:"POST",headers:{"Content-Type":"text/plain"},body:js});
    if(!r.ok) throw new Error("HTTP "+r.status);
    flash("✓ Guardado en runtime/labs.js — commiteá y push para publicar.");
  }catch(e){
    downloadLabsFile(js);
    flash("No pude escribir el archivo (¿está corriendo serve.js, reiniciado?). Descargué labs.js para reemplazarlo a mano.", true);
  }
}
// ---- import existing boards from labs.js (window.NP_LABS) ----
function labFromNP(d){
  if(!d) return null;
  const comps = d.components || (d.diagram && d.diagram.components);
  if(!Array.isArray(comps)) return null;
  return { name:d.name||"Placa sin nombre", group:d.group||"Trabajos Prácticos", components:JSON.parse(JSON.stringify(comps)) };
}
function importLabsJs(replace){
  const arr = Array.isArray(window.NP_LABS) ? window.NP_LABS : [];
  const imported = arr.map(labFromNP).filter(Boolean);
  if(!imported.length){ flash("labs.js has no boards to import.", true); return; }
  if(replace){ if(library.length && !confirm("Replace the lab list with the "+imported.length+" board(s) from labs.js?")) return; library=imported; }
  else { const names=new Set(library.map((b)=>b.name)); imported.forEach((b)=>{ if(!names.has(b.name)) library.push(b); }); }
  editIndex=-1; saveLib(); renderLibrary(); flash("Imported "+imported.length+" board(s) from labs.js.");
}
// seed the library from the existing labs.js the first time (empty library)
if(!library.length) importLabsJs(false);

refresh();
</script>
</body>
</html>
